services:
  daemon:
    build: .
    restart: unless-stopped
    ports:
      # Bind only to loopback so the IPC port is not reachable from the network.
      # The TUI on the host connects to 127.0.0.1:29374 as normal.
      - "127.0.0.1:29374:29374"
    environment:
      - UPTUI_LISTEN_ADDR=0.0.0.0:29374
      - UPTUI_CONFIG_DIR=/config
      - UPTUI_DATA_DIR=/data
    volumes:
      # Config directory — place your monitors.toml here.
      # The daemon picks up edits within 5 seconds; no restart needed.
      - ./config:/config
      # Data directory — check history, PID file, and daemon log.
      # Using a named volume keeps the data managed by Docker.
      - uptui-data:/data

volumes:
  uptui-data:
